name: IndexNow 流式推送

on:
  # push 到 main 分支时自动触发（仅内容变更时）
  push:
    branches: [ main ]
    paths:
      - 'src/app/**'
      - 'prisma/schema.prisma'
      - 'prisma/seed.ts'
      - 'src/scripts/**'
  # 手动触发
  workflow_dispatch:

jobs:
  indexnow-submit:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: 安装依赖（含 dev）
        run: npm install --prefer-offline
        working-directory: .

      - name: 流式推送 IndexNow（限前 200 条）
        run: npm run indexnow -- --limit 200
        working-directory: .
